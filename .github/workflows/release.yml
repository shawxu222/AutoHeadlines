name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version without the v prefix"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Select version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          fi

      - name: Verify source
        run: |
          python -m pip install -e ".[dev]"
          ruff check src tests
          pytest -q

      - name: Build user download
        run: python scripts/build_release.py --version "$VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: XAutoHeadlines-macOS-${{ env.VERSION }}
          path: |
            dist/XAutoHeadlines-macOS-${{ env.VERSION }}.zip
            dist/SHA256SUMS.txt

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/XAutoHeadlines-macOS-${VERSION}.zip" \
            "dist/SHA256SUMS.txt" \
            --notes-file "docs/RELEASE_NOTES.md" \
            --title "XAutoHeadlines ${GITHUB_REF_NAME}"
